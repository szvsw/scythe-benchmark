services:
  fanouts:
    image: ${AWS_ACCOUNT_ID:-123456789012}.dkr.ecr.${AWS_REGION:-us-east-1}.amazonaws.com/scythe-benchmark/worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.13}
    env_file:
      - .env
    environment:
      SCYTHE_WORKER_SLOTS: 8
      SCYTHE_WORKER_DOES_FAN: "True"
      SCYTHE_WORKER_DOES_LEAF: "False"
    deploy:
      mode: replicated
      replicas: 8

  simulations:
    image: ${AWS_ACCOUNT_ID:-123456789012}.dkr.ecr.${AWS_REGION:-us-east-1}.amazonaws.com/scythe-benchmark/worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.13}
    env_file:
      - .env
    environment:
      SCYTHE_WORKER_SLOTS: 4
      SCYTHE_WORKER_DOES_FAN: "False"
      SCYTHE_WORKER_DOES_LEAF: "True"
    deploy:
      mode: replicated
      replicas: ${SIMULATIONS_REPLICAS:-8}
